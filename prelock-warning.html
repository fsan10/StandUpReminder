<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>久坐提醒</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: transparent;
      overflow: hidden;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow:
        0 14px 28px rgba(0,0,0,0.12),
        0 6px 12px rgba(0,0,0,0.06),
        0 0 0 1px rgba(99,102,241,0.08);
      padding: 14px 16px 12px;
      animation: slideUp 0.35s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
      border-top: 2px solid;
      border-top-color: #f59e0b;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .icon-wrap {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      animation: pulse 1.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    .header-text { flex: 1; }
    .title { font-size: 12px; font-weight: 700; color: #1f2937; }
    .subtitle { font-size: 10px; color: #9ca3af; margin-top: 1px; }

    .message {
      font-size: 11px;
      color: #4b5563;
      margin-bottom: 6px;
      line-height: 1.5;
    }

    .countdown {
      font-size: 22px;
      font-weight: 700;
      color: #f59e0b;
      text-align: center;
      margin-bottom: 10px;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.5px;
    }

    /* Buttons */
    .buttons {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition:
        transform 0.2s cubic-bezier(0.34, 1.2, 0.64, 1),
        box-shadow 0.2s ease,
        background 0.2s ease;
    }

    .btn-postpone {
      background: #f3f4f6;
      color: #374151;
    }

    .btn-postpone:hover {
      background: #e5e7eb;
      transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(0,0,0,0.07);
    }

    .btn-postpone:active {
      transform: translateY(0) scale(0.97);
    }

    .btn-confirm {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      box-shadow: 0 3px 10px rgba(99,102,241,0.25);
    }

    .btn-confirm:hover {
      transform: translateY(-1px);
      box-shadow: 0 5px 14px rgba(99,102,241,0.35);
      background: linear-gradient(135deg, #818cf8, #a78bfa);
    }

    .btn-confirm:active {
      transform: translateY(0) scale(0.97);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon-wrap">⏰</div>
      <div class="header-text">
        <div class="title">久坐提醒</div>
        <div class="subtitle">工作时长即将结束</div>
      </div>
    </div>

    <div class="message">您已连续工作较长时间，即将进入休息时间。</div>

    <div class="countdown" id="countdown">5 秒后锁屏</div>

    <div class="buttons">
      <button class="btn btn-postpone" id="postponeBtn">⏱ 推迟</button>
      <button class="btn btn-confirm" id="confirmBtn">☕ 立即休息</button>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const countdownEl = document.getElementById('countdown');
    const postponeBtn = document.getElementById('postponeBtn');
    const confirmBtn = document.getElementById('confirmBtn');
    let seconds = 5;
    let interval = null;

    function startCountdown() {
      interval = setInterval(() => {
        seconds--;
        countdownEl.textContent = seconds <= 0 ? '正在锁屏...' : `${seconds} 秒后锁屏`;
        if (seconds <= 0) clearInterval(interval);
      }, 1000);
    }

    postponeBtn.addEventListener('click', () => {
      clearInterval(interval);
      ipcRenderer.send('postpone-lock');
    });

    confirmBtn.addEventListener('click', () => {
      clearInterval(interval);
      ipcRenderer.send('confirm-lock');
    });

    startCountdown();
  </script>
</body>
</html>
