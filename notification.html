<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>提醒</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: transparent;
      overflow: hidden;
      display: flex;
      flex-direction: column-reverse;
      justify-content: flex-start;
      align-items: flex-end;
      padding: 0;
      height: 100vh;
    }

    .notification-stack {
      display: flex;
      flex-direction: column-reverse;
      gap: 10px;
      width: 300px;
      position: fixed;
      bottom: 8px;
      right: 8px;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow:
        0 10px 20px rgba(0,0,0,0.1),
        0 4px 8px rgba(0,0,0,0.06),
        0 0 0 1px rgba(0,0,0,0.04);
      padding: 10px 12px;
      animation: slideUp 0.3s cubic-bezier(0.34, 1.15, 0.64, 1) forwards;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-left: 3px solid;
      transition: opacity 0.3s, transform 0.3s;
    }

    .card.water { border-left-color: #3b82f6; }
    .card.custom { border-left-color: #8b5cf6; }
    .card.info { border-left-color: #6366f1; }
    .card.prelock { border-left-color: #f59e0b; border-top: 2px solid #f59e0b; border-left-width: 0; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .top-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon {
      width: 26px; height: 26px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      animation: pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) 0.08s both;
    }

    .card.water .icon { background: #dbeafe; }
    .card.custom .icon { background: #ede9fe; }
    .card.info .icon { background: #ede9fe; }
    .card.prelock .icon { background: linear-gradient(135deg, #fef3c7, #fde68a); animation: pulse 1.5s ease-in-out infinite; }

    @keyframes pop {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    .info { flex: 1; }
    .title { font-size: 12px; font-weight: 700; color: #1f2937; }
    .message { font-size: 11px; color: #6b7280; margin-top: 1px; line-height: 1.4; }

    .buttons {
      display: flex;
      gap: 6px;
    }

    .btn {
      flex: 1;
      padding: 5px 10px;
      border: none;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition:
        transform 0.2s cubic-bezier(0.34, 1.2, 0.64, 1),
        box-shadow 0.2s ease,
        background 0.2s ease;
    }

    .btn-dismiss {
      background: #f3f4f6;
      color: #374151;
    }

    .btn-dismiss:hover {
      background: #e5e7eb;
      transform: translateY(-1px);
      box-shadow: 0 3px 8px rgba(0,0,0,0.06);
    }

    .btn-dismiss:active {
      transform: translateY(0) scale(0.97);
    }

    .btn-postpone {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      box-shadow: 0 2px 8px rgba(99,102,241,0.22);
    }

    .btn-postpone:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99,102,241,0.3);
      background: linear-gradient(135deg, #818cf8, #a78bfa);
    }

    .btn-postpone:active {
      transform: translateY(0) scale(0.97);
    }

    .btn-danger {
      background: #fee2e2;
      color: #ef4444;
    }

    .btn-danger:hover {
      background: #fecaca;
      transform: translateY(-1px);
    }

    .hidden-count {
      text-align: center;
      font-size: 11px;
      color: #9ca3af;
      padding: 4px 0;
    }
  </style>
</head>
<body>
  <div class="notification-stack" id="stack"></div>

  <script>
    const { ipcRenderer } = require('electron');
    const stack = document.getElementById('stack');

    function getIcon(type) {
      if (type === 'water') return '💧';
      if (type === 'custom') return '📌';
      if (type === 'prelock') return '⏰';
      return '🔔';
    }

    ipcRenderer.on('render-queue', (e, data) => {
      stack.innerHTML = '';

      if (data.hiddenCount > 0) {
        const hiddenEl = document.createElement('div');
        hiddenEl.className = 'hidden-count';
        hiddenEl.textContent = `还有 ${data.hiddenCount} 个提醒`;
        stack.appendChild(hiddenEl);
      }

      data.visible.forEach(item => {
        const card = document.createElement('div');
        card.className = `card ${item.type || 'info'}`;
        card.dataset.id = item.id;

        const isPreLock = item.isPreLock;
        const iconEmoji = getIcon(item.type);

        let buttonsHtml = '';
        if (isPreLock) {
          buttonsHtml = `
            <div class="buttons">
              <button class="btn btn-postpone postpone-lock-btn">⏱ 推迟</button>
              <button class="btn btn-danger confirm-lock-btn">☕ 立即休息</button>
            </div>`;
        } else {
          buttonsHtml = `
            <div class="buttons">
              <button class="btn btn-dismiss dismiss-btn">知道了</button>
              ${item.canPostpone ? '<button class="btn btn-postpone postpone-btn">稍后提醒</button>' : ''}
            </div>`;
        }

        card.innerHTML = `
          <div class="top-row">
            <div class="icon">${iconEmoji}</div>
            <div class="info">
              <div class="title">${item.title}</div>
              <div class="message">${item.message}</div>
            </div>
          </div>
          ${buttonsHtml}
        `;

        const dismissBtn = card.querySelector('.dismiss-btn');
        if (dismissBtn) {
          dismissBtn.addEventListener('click', () => {
            ipcRenderer.send('notification-dismiss', item.id);
          });
        }

        const postponeBtn = card.querySelector('.postpone-btn');
        if (postponeBtn) {
          postponeBtn.addEventListener('click', () => {
            ipcRenderer.send('notification-postpone');
          });
        }

        const postponeLockBtn = card.querySelector('.postpone-lock-btn');
        if (postponeLockBtn) {
          postponeLockBtn.addEventListener('click', () => {
            ipcRenderer.send('notification-postpone-lock');
          });
        }

        const confirmLockBtn = card.querySelector('.confirm-lock-btn');
        if (confirmLockBtn) {
          confirmLockBtn.addEventListener('click', () => {
            ipcRenderer.send('confirm-lock');
          });
        }

        stack.appendChild(card);
      });

      ipcRenderer.send('resize-notification', { height: Math.max(stack.scrollHeight + 16, 60) });
    });
  </script>
</body>
</html>
